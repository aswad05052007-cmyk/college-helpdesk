<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Login</title>

<style>
body {
    margin:0;
    font-family:'Segoe UI';
    background: linear-gradient(135deg, #667eea, #764ba2);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    color:white;
}

/* CARD */
.card {
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(12px);
    padding:30px;
    border-radius:20px;
    width:320px;
    text-align:center;
    animation: fadeIn 1s;
    box-shadow: 0px 5px 20px rgba(0,0,0,0.3);
}

/* TITLE */
.title {
    font-size:22px;
    margin-bottom:10px;
}

/* INPUT */
input {
    width:90%;
    padding:12px;
    margin:10px;
    border:none;
    border-radius:10px;
    outline:none;
}

/* BUTTON */
button {
    width:95%;
    padding:12px;
    border:none;
    border-radius:20px;
    background:#00c6ff;
    color:white;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
}

button:hover {
    background:#0072ff;
}

/* ERROR */
.error {
    color:#ff4d4d;
    margin-top:10px;
}

/* FOOTER */
.footer {
    margin-top:15px;
    font-size:12px;
}

/* ANIMATION */
@keyframes fadeIn {
    from {
        opacity:0;
        transform: translateY(30px);
    }
    to {
        opacity:1;
        transform: translateY(0);
    }
}
</style>
</head>

<body>

<div class="card">

<div class="title">🎓 SHANTINIKETAN College Helpdesk</div>
<p>Student Login</p>

<form method="POST">
<input name="username" placeholder="Enter Username">
<input type="password" name="password" placeholder="Enter Password">
<button>Login</button>
</form>

<div class="error">{{ error }}</div>

<div class="footer">
Welcome to Smart Helpdesk System 🤖
</div>

</div>

</body>
</html>
